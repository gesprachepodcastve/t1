<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Óptica Pro: Ley de Gauss y Casos Clínicos | Physioprepas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&display=swap');

        body {
            font-family: 'Public Sans', sans-serif;
            background-color: #f0f0f0;
            background-image: radial-gradient(#000000 1px, transparent 1px);
            background-size: 30px 30px;
            color: #1a1a1a;
            overflow-x: hidden;
        }

        .brutalist-card {
            background: white;
            border: 4px solid black;
            box-shadow: 8px 8px 0px 0px rgba(0,0,0,1);
            transition: all 0.2s ease;
        }

        .case-active {
            border-color: #3b82f6;
            transform: translate(-2px, -2px);
            box-shadow: 10px 10px 0px 0px #3b82f6;
        }

        .brutalist-btn {
            border: 3px solid black;
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
            transition: all 0.1s ease;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 900;
        }

        .brutalist-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px 0px rgba(0,0,0,1);
        }

        .term-hover {
            cursor: help;
            border-bottom: 2px dashed #3b82f6;
            position: relative;
            font-weight: 700;
        }

        .term-hover:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 130%;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            color: #fff;
            padding: 8px 12px;
            font-size: 11px;
            z-index: 9999;
            border: 2px solid #3b82f6;
            box-shadow: 4px 4px 0px black;
            pointer-events: none;
            min-width: 200px;
            text-transform: none;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            background: #3b82f6;
            border: 3px solid black;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 2px 2px 0px black;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            background: #000;
            border: 1px solid black;
        }

        .ciliary-muscle {
            transition: all 0.4s ease;
            fill: #ef4444;
            stroke: black;
            stroke-width: 2;
        }
        .muscle-contracted {
            transform: scale(1.1) translateX(5px);
            fill: #22c55e;
        }
        
        #lens { transition: all 0.4s ease; transform-origin: center; }
        .lens-near { d: path("M 50 10 Q 90 50 50 90 Q 10 50 50 10"); fill: #60a5fa; }
        .lens-far { d: path("M 50 20 Q 70 50 50 80 Q 30 50 50 20"); fill: #bae6fd; }

        .light-ray {
            stroke-width: 2;
            fill: none;
            transition: d 0.3s ease;
        }
        
        .ray-path {
            stroke: #facc15;
            stroke-dasharray: 5, 5;
            animation: ray-flow 2s linear infinite;
        }

        @keyframes ray-flow {
            to { stroke-dashoffset: -20; }
        }

        .focus-point {
            fill: #ef4444;
            filter: drop-shadow(0 0 5px #ef4444);
        }

        .status-badge {
            font-size: 10px;
            padding: 2px 8px;
            border: 2px solid black;
            font-weight: 900;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-6">

        <!-- HEADER -->
        <header class="bg-yellow-400 p-6 brutalist-card flex flex-col md:flex-row justify-between items-center text-black gap-4 border-b-8 border-r-8">
            <div>
                <h1 class="text-4xl font-black italic uppercase tracking-tighter leading-none">LABORATORIO <span class="bg-black text-yellow-400 px-2">GAUSS</span></h1>
                <p class="text-xs font-bold uppercase mt-2 tracking-widest opacity-80 underline decoration-black underline-offset-4">Exploración Clínica del Poder Dióptrico</p>
            </div>
            <div class="bg-white p-4 border-4 border-black flex flex-col items-center">
                <span class="text-[10px] font-black uppercase mb-1">Ecuación Fundamental</span>
                <span class="text-xl font-black font-mono">1/f = 1/s + 1/s'</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">

            <!-- PANEL IZQUIERDO: CONTROLES -->
            <aside class="lg:col-span-4 space-y-6">
                
                <!-- CONTROL DE VARIABLES -->
                <div class="brutalist-card p-5 bg-white">
                    <h2 class="font-black text-sm uppercase border-b-4 border-black pb-2 mb-4 flex items-center">
                        <i class="fas fa-sliders-h mr-2"></i> Variables Ópticas
                    </h2>
                    
                    <div class="space-y-6">
                        <!-- Objeto (s) -->
                        <div>
                            <label class="flex justify-between font-bold text-xs uppercase mb-2">
                                <span class="term-hover" data-tooltip="Distancia del objeto al ojo. En el infinito (s > 6m) el ojo normal está en reposo.">Distancia Objeto (s)</span>
                                <span id="valS" class="bg-black text-white px-2 py-1">5.00 m</span>
                            </label>
                            <input type="range" id="sliderS" min="0.2" max="10" step="0.1" value="5" oninput="manualControl()">
                        </div>

                        <!-- Longitud Ojo (s') -->
                        <div>
                            <label class="flex justify-between font-bold text-xs uppercase mb-2">
                                <span class="term-hover" data-tooltip="Distancia del cristalino a la retina. Un ojo normal mide ~24mm (0.024m).">Longitud Ocular (s')</span>
                                <span id="valSPrime" class="bg-black text-white px-2 py-1">24.00 mm</span>
                            </label>
                            <input type="range" id="sliderSPrime" min="15" max="35" step="0.5" value="24" oninput="manualControl()">
                        </div>

                        <!-- Lente Externo -->
                        <div>
                            <label class="block font-bold text-xs uppercase mb-2">Lente Corrector Externo</label>
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="setCorrector('none')" id="btnNone" class="brutalist-btn p-2 text-[10px] bg-zinc-200">Ninguno</button>
                                <button onclick="setCorrector('convex')" id="btnConvex" class="brutalist-btn p-2 text-[10px] bg-blue-200">Convexo (+)</button>
                                <button onclick="setCorrector('concave')" id="btnConcave" class="brutalist-btn p-2 text-[10px] bg-red-200">Cóncavo (-)</button>
                                <button onclick="toggleAcomodacion()" id="btnAuto" class="brutalist-btn p-2 text-[10px] bg-green-200">Auto-Acomodar</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ESTADO DEL SISTEMA -->
                <div class="brutalist-card p-5 bg-zinc-900 text-white space-y-4">
                    <h2 class="font-black text-xs uppercase text-zinc-400 border-b border-zinc-700 pb-2">Análisis de Refracción</h2>
                    
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] uppercase">Potencia Requerida:</span>
                        <span id="calcP" class="text-xl font-black font-mono text-blue-400">0.00 D</span>
                    </div>

                    <div class="flex justify-between items-center">
                        <span class="text-[10px] uppercase">Foco Actual (f):</span>
                        <span id="calcF" class="text-xl font-black font-mono text-yellow-400">0.00 m</span>
                    </div>

                    <div id="focusStatus" class="bg-red-600 p-2 text-center text-xs font-black uppercase">
                        Imagen Desenfocada
                    </div>
                </div>
            </aside>

            <!-- PANEL CENTRAL: SIMULADOR -->
            <main class="lg:col-span-8 space-y-6">
                <div class="brutalist-card bg-white p-6 relative overflow-hidden border-8 border-black">
                    <div class="absolute top-0 left-0 w-full bg-black text-white px-4 py-1 text-[10px] font-black uppercase flex justify-between">
                        <span>Simulación en Tiempo Real</span>
                        <span id="currentModeLabel">Modo Manual</span>
                    </div>
                    
                    <svg width="100%" height="320" viewBox="0 0 800 320" id="opticsSvg" class="mt-4">
                        <defs>
                            <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                              <path d="M 0 0 L 10 5 L 0 10 z" fill="black" />
                            </marker>
                        </defs>

                        <!-- Eje óptico -->
                        <line x1="20" y1="160" x2="780" y2="160" stroke="#ddd" stroke-width="2" stroke-dasharray="10,5" />
                        
                        <!-- Rayos -->
                        <g id="lightRays"></g>
                        
                        <!-- Punto de Foco Real -->
                        <circle id="focusPoint" cx="0" cy="160" r="6" class="focus-point" />

                        <!-- Objeto -->
                        <g id="objGroup">
                            <line id="objLine" x1="0" y1="160" x2="0" y2="100" stroke="black" stroke-width="6" marker-end="url(#arrow)" />
                            <text x="0" y="180" text-anchor="middle" font-weight="900" font-size="12">OBJETO (s)</text>
                        </g>

                        <!-- Lente Externo (Corrector) -->
                        <g id="extLensGroup" opacity="0">
                            <path id="extLens" d="M 360 80 Q 380 160 360 240 Q 340 160 360 80" fill="rgba(100,200,255,0.3)" stroke="black" stroke-width="2" />
                            <text x="360" y="260" text-anchor="middle" font-weight="bold" font-size="10">LENTE EXTERNO</text>
                        </g>

                        <!-- Cristalino -->
                        <g transform="translate(400, 110)">
                            <path id="lens" class="lens-far" stroke="black" stroke-width="4" />
                            <path id="mTop" class="ciliary-muscle" d="M -20 -10 Q 0 -30 20 -10 L 15 10 Z" />
                            <path id="mBottom" class="ciliary-muscle" d="M -20 110 Q 0 130 20 110 L 15 90 Z" />
                            <text x="0" y="140" text-anchor="middle" font-weight="900" font-size="12">CRISTALINO</text>
                        </g>

                        <!-- Estructura del Ojo (Esclerótica/Retina) -->
                        <g id="retinaGroup">
                            <path id="eyeOutline" d="M 400 60 C 450 60 550 80 550 160 C 550 240 450 260 400 260" fill="none" stroke="#ccc" stroke-width="2" />
                            <path id="retinaPath" d="M 550 80 Q 580 160 550 240" fill="none" stroke="#ef4444" stroke-width="8" stroke-linecap="round" />
                            <text x="550" y="270" text-anchor="middle" font-weight="900" font-size="12">RETINA (s')</text>
                        </g>
                    </svg>
                </div>

                <!-- CASOS CLÍNICOS INTERACTIVOS -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button onclick="loadCase('miopia')" class="brutalist-card p-4 text-left hover:bg-red-50 group cursor-pointer" id="case-miopia">
                        <div class="flex justify-between items-start">
                            <h3 class="font-black uppercase text-sm">Caso A: Miopía Axial</h3>
                            <span class="status-badge bg-red-200">Patología</span>
                        </div>
                        <p class="text-[10px] mt-2 leading-relaxed">Globo ocular demasiado largo. La imagen se forma <strong>antes</strong> de la retina. Necesita divergencia.</p>
                    </button>

                    <button onclick="loadCase('hipermetropia')" class="brutalist-card p-4 text-left hover:bg-blue-50 group cursor-pointer" id="case-hipermetropia">
                        <div class="flex justify-between items-start">
                            <h3 class="font-black uppercase text-sm">Caso B: Hipermetropía</h3>
                            <span class="status-badge bg-blue-200">Patología</span>
                        </div>
                        <p class="text-[10px] mt-2 leading-relaxed">Globo ocular corto o cristalino débil. El foco cae <strong>detrás</strong> de la retina.</p>
                    </button>

                    <button onclick="loadCase('presbicia')" class="brutalist-card p-4 text-left hover:bg-orange-50 group cursor-pointer" id="case-presbicia">
                        <div class="flex justify-between items-start">
                            <h3 class="font-black uppercase text-sm">Caso C: Presbicia</h3>
                            <span class="status-badge bg-orange-200">Fisiológico</span>
                        </div>
                        <p class="text-[10px] mt-2 leading-relaxed">Pérdida de elasticidad (acomodación). El objeto cercano (s pequeño) no se enfoca.</p>
                    </button>

                    <button onclick="loadCase('emetrope')" class="brutalist-card p-4 text-left hover:bg-green-50 group cursor-pointer" id="case-emetrope">
                        <div class="flex justify-between items-start">
                            <h3 class="font-black uppercase text-sm">Caso D: Ojo Emétrope</h3>
                            <span class="status-badge bg-green-200">Normal</span>
                        </div>
                        <p class="text-[10px] mt-2 leading-relaxed">Sistema en equilibrio perfecto. s' = f para visión lejana en reposo.</p>
                    </button>
                </div>
            </main>
        </div>
    </div>

    <script>
        // Estado Global
        let state = {
            s: 5,
            sPrime: 0.024,
            correctorType: 'none', // none, convex, concave
            autoAcomodar: false,
            currentCase: 'emetrope'
        };

        const LENS_X = 400;

        function manualControl() {
            state.s = parseFloat(document.getElementById('sliderS').value);
            state.sPrime = parseFloat(document.getElementById('sliderSPrime').value) / 1000;
            state.currentCase = 'manual';
            updateSimulation();
        }

        function setCorrector(type) {
            state.correctorType = type;
            updateSimulation();
        }

        function toggleAcomodacion() {
            state.autoAcomodar = !state.autoAcomodar;
            updateSimulation();
        }

        function loadCase(caseType) {
            state.currentCase = caseType;
            state.autoAcomodar = false;
            state.correctorType = 'none';

            switch(caseType) {
                case 'miopia':
                    state.s = 10; // Objeto lejano
                    state.sPrime = 0.032; // Ojo largo
                    break;
                case 'hipermetropia':
                    state.s = 10;
                    state.sPrime = 0.018; // Ojo corto
                    break;
                case 'presbicia':
                    state.s = 0.5; // Objeto muy cercano
                    state.sPrime = 0.024;
                    break;
                case 'emetrope':
                    state.s = 10;
                    state.sPrime = 0.024;
                    break;
            }
            
            // Actualizar sliders UI
            document.getElementById('sliderS').value = state.s;
            document.getElementById('sliderSPrime').value = state.sPrime * 1000;
            
            updateSimulation();
        }

        function updateSimulation() {
            // Actualizar Etiquetas UI
            document.getElementById('valS').innerText = state.s.toFixed(2) + " m";
            document.getElementById('valSPrime').innerText = (state.sPrime * 1000).toFixed(2) + " mm";
            document.getElementById('currentModeLabel').innerText = state.currentCase.toUpperCase();

            // Cálculo de Potencia (Gauss)
            // 1/f = 1/s + 1/s'
            const invS = 1 / state.s;
            const invSPrime = 1 / state.sPrime;
            
            let powerNeeded = invS + invSPrime;
            let currentPower = 1 / 0.017; // Poder base del ojo humano ~58D

            // Si auto-acomodamos, forzamos que f sea igual a lo necesario para s'
            let finalInvF = state.autoAcomodar ? powerNeeded : (1/0.017); 
            
            // Aplicar corrector
            if(state.correctorType === 'convex') finalInvF += 10; // Añade 10 Dioptrías
            if(state.correctorType === 'concave') finalInvF -= 10; // Quita 10 Dioptrías

            const f = 1 / finalInvF;
            
            // Actualizar Dashboard
            document.getElementById('calcP').innerText = finalInvF.toFixed(2) + " D";
            document.getElementById('calcF').innerText = f.toFixed(4) + " m";

            // Visualización Gráfica
            // Escalar posiciones: Lente está en 400. s' se escala para que 24mm sea ~200px
            const objX = LENS_X - (state.s * 30);
            const retinaX = LENS_X + (state.sPrime * 6000); 
            const focusX = LENS_X + (f * 6000);

            // Mover Objeto
            document.getElementById('objGroup').setAttribute('transform', `translate(${Math.max(20, objX)}, 0)`);
            
            // Mover Retina
            document.getElementById('retinaGroup').setAttribute('transform', `translate(${retinaX - 580}, 0)`);
            document.getElementById('eyeOutline').setAttribute('d', `M 400 60 C 450 60 ${retinaX-30} 80 ${retinaX-30} 160 C ${retinaX-30} 240 450 260 400 260`);

            // Mover Punto de Foco
            const focusPoint = document.getElementById('focusPoint');
            focusPoint.setAttribute('cx', focusX);
            
            // Estado de enfoque
            const statusBox = document.getElementById('focusStatus');
            const diff = Math.abs(focusX - retinaX);
            if (diff < 15) {
                statusBox.innerText = "Imagen Enfocada";
                statusBox.className = "bg-green-600 p-2 text-center text-xs font-black uppercase";
                focusPoint.style.fill = "#22c55e";
            } else {
                statusBox.innerText = focusX < retinaX ? "Desenfoque Anterior (Miope)" : "Desenfoque Posterior (Hipermetrope)";
                statusBox.className = "bg-red-600 p-2 text-center text-xs font-black uppercase";
                focusPoint.style.fill = "#ef4444";
            }

            // Animación Cristalino
            const isAccomodating = finalInvF > 60 || state.autoAcomodar;
            const lensNode = document.getElementById('lens');
            lensNode.className.baseVal = isAccomodating ? "lens-near" : "lens-far";
            if(isAccomodating) {
                document.getElementById('mTop').classList.add('muscle-contracted');
                document.getElementById('mBottom').classList.add('muscle-contracted');
            } else {
                document.getElementById('mTop').classList.remove('muscle-contracted');
                document.getElementById('mBottom').classList.remove('muscle-contracted');
            }

            // Lente Externo
            const extLens = document.getElementById('extLensGroup');
            if(state.correctorType !== 'none') {
                extLens.setAttribute('opacity', '1');
                document.getElementById('extLens').setAttribute('fill', state.correctorType === 'convex' ? 'rgba(59, 130, 246, 0.3)' : 'rgba(239, 68, 68, 0.3)');
            } else {
                extLens.setAttribute('opacity', '0');
            }

            // Dibujar Rayos
            drawRays(Math.max(20, objX), LENS_X, focusX, retinaX);

            // Resaltar Caso Activo
            document.querySelectorAll('.brutalist-card').forEach(c => c.classList.remove('case-active'));
            if(state.currentCase !== 'manual') {
                document.getElementById('case-' + state.currentCase)?.classList.add('case-active');
            }
        }

        function drawRays(objX, lensX, focusX, retinaX) {
            const raysGroup = document.getElementById('lightRays');
            raysGroup.innerHTML = '';
            
            const heights = [-30, 0, 30]; 
            heights.forEach(h => {
                let path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                
                // Los rayos convergen en el punto de FOCO (focusX), no necesariamente en la retina
                // Pero después del foco, los rayos se cruzan
                const endX = Math.max(retinaX, focusX) + 50;
                const slope = (-h) / (focusX - lensX);
                const endY = 160 + (slope * (endX - focusX));

                path.setAttribute('d', `M ${objX} ${160+h} L ${lensX} ${160+h} L ${focusX} 160 L ${endX} ${endY}`);
                path.setAttribute('class', 'light-ray ray-path');
                raysGroup.appendChild(path);
            });
        }

        // Estilo dinámico para botones de corrector
        function updateButtons() {
            document.getElementById('btnNone').style.backgroundColor = state.correctorType === 'none' ? '#000' : '';
            document.getElementById('btnNone').style.color = state.correctorType === 'none' ? '#fff' : '';
            // ... similar para otros botones si se desea pulir más
        }

        window.onload = () => loadCase('emetrope');
    </script>
</body>
</html>
